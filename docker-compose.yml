version: '3.8'

services:
  obsidian-test-env:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: second-brain-tester
    # 🌟 CORREÇÃO 1: Aumenta a memória compartilhada. 
    # O padrão do Docker é só 64MB, o que faz o terminal do Obsidian crashar.
    shm_size: '2gb' 
    security_opt:
      - seccomp:unconfined
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      # 🌟 CORREÇÃO 2: Força o motor do Obsidian a desativar a aceleração de hardware 
      # e usar renderização estável via CPU dentro do VNC.
      - ELECTRON_DISABLE_GPU=1
      - DISABLE_GPU=true
    volumes:
      - obsidian-app-data:/config
      - ./second-brain-vault:/vault
    ports:
      - 3000:3000
    restart: unless-stopped

volumes:
  obsidian-app-data: